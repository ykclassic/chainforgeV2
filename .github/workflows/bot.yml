name: AEGIS Hourly Intelligence Cycle
on:
  schedule:
    - cron: '0 * * * *' # Every Hour
  workflow_dispatch:      # Manual Trigger

jobs:
  trade_cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Required to push ledger updates
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pandas pandas_ta_classic ccxt requests discord-webhook
      - name: Run Cycle
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CRYPTOPANIC_KEY: ${{ secrets.CRYPTOPANIC_KEY }}
        run: python -m scripts.run_backtest
      - name: Commit & Push Ledger Changes
        run: |
          git config --global user.name 'AEGIS-Bot'
          git config --global user.email 'bot@techsolute.com'
          git add data/ledger.json
          git commit -m "🤖 Update Ledger [skip ci]" || echo "No changes"
          git push
